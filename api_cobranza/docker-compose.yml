version: "3.9"

services:
  # ============================================
  # BALANCEADOR NGINX
  # ============================================
  nginx:
    image: nginx:1.27
    container_name: factupid_nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - api_files
      - api_support
      - api_billing
    networks:
      - backend

  # ============================================
  # APLICACIÓN 1
  # ============================================
  app1:
    build: .
    container_name: factupid_app1
    env_file: .env
    depends_on:
      - postgres
    networks:
      - backend

  # ============================================
  # APLICACIÓN 2
  # ============================================
  app2:
    build: .
    container_name: factupid_app2
    env_file: .env
    depends_on:
      - postgres
    networks:
      - backend

  