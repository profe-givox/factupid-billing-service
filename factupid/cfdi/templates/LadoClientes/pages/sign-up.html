{% extends "LadoClientes/layouts/base-auth.html" %}
{% load static %}

{% block content %}
<main class="main-content mt-0">
  <section>
    <div class="page-header min-vh-100" >
      <span class="mask bg-gradient-dark opacity-5"></span>
      <div class="container">
        <div class="row">
          <div class="col-6 d-lg-flex d-none h-100 my-auto pe-0 position-absolute top-0 start-0 text-center justify-content-center flex-column">
            <div class="position-relative bg-gradient-primary h-100 m-3 px-7 border-radius-lg d-flex flex-column justify-content-center" >
            </div>
          </div>
          <div class="col-xl-4 col-lg-5 col-md-7 d-flex flex-column ms-auto me-auto ms-lg-auto me-lg-5">
            <div class="card card-plain" style="background-color: #f8f9fa;">
              <div class="card-header">
                <h4 class="font-weight-bolder">Registrarse</h4>
                <p class="mb-0">Coloca un nombre de usuario y contraseña para registrarte</p>
              </div>
              <div class="card-body">
                <form method="post" role="form">
                  {% csrf_token %}
                  {% for field in form %}
                  <div class="input-group input-group-outline mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                    {{ field }}
                  </div>
                  {% endfor %}
                  <div class="form-check form-check-info text-start ps-0">
                    <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" checked>
                    <label class="form-check-label" for="flexCheckDefault">
                      Acepto <a href="javascript:;" class="text-dark font-weight-bolder">Términos y Condiciones</a>
                    </label>
                  </div>
                  <div class="text-center">
                    <button type="submit" class="btn btn-lg bg-gradient-dark btn-lg w-100 mt-4 mb-0">Registrarse</button>
                  </div>
                </form>
              </div>
              <div class="card-footer text-center pt-0 px-lg-2 px-1">
                <p class="mb-2 text-sm mx-auto">
                  ¿Ya tienes cuenta?
                  <a href="{% url "index" %}" class="text-primary text-gradient font-weight-bold">Inicia sesión</a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const inputs = document.querySelectorAll(".input-group input");

    inputs.forEach(input => {
      const label = input.parentElement.querySelector("label");

      const toggleLabel = () => {
        if (input.value.trim() !== "") {
          label.style.visibility = "hidden"; // Esconde la etiqueta si hay texto
        } else {
          label.style.visibility = "visible"; // Muestra la etiqueta si está vacío
        }
      };

      // Aplica el evento al cargar la página y al escribir
      toggleLabel();
      input.addEventListener("input", toggleLabel);
    });
  });
</script>

<style>
  .form-label {
    transition: visibility 0.2s ease, opacity 0.2s ease;
  }
  .form-label[style*="visibility: hidden"] {
    opacity: 0; /* Hace que las etiquetas se desvanezcan */
  }
</style>
{% endblock content %}
