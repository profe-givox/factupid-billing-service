{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vista previa PDF</title>
  <style>
    {{ css_renderizado|safe }}

    body {
      font-family: Arial, sans-serif;
      background-color:rgb(103, 98, 98);
      margin: 0;
      padding: 20px;
    }

    .contenedor {
      max-width: 1000px;
      margin: auto;
      background-color: rgb(204, 195, 195);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .PDF {
      background: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      width: 210mm;
      margin-left: auto;
    margin-right: auto;
    }

    @media print {
      .boton-imprimir {
        display: none;
      }

      .contenedor {
        box-shadow: none;
        border: none;
      }

      body {
        background: white;
      }
    }
    .btn {
      display: inline-block;
      font-weight: 400;
      color: #fff;
      text-align: center;
      vertical-align: middle;
      user-select: none;
      background-color: #0d6efd;
      border: 1px solid #0d6efd;
      padding: 0.375rem 0.75rem;
      font-size: 1rem;
      line-height: 1.5;
      border-radius: 0.375rem;
      text-decoration: none;
      transition: background-color 0.15s ease-in-out, 
                  border-color 0.15s ease-in-out,
                  box-shadow 0.15s ease-in-out;
    }

    .btn:hover {
      background-color: #0b5ed7;
      border-color: #0a58ca;
      text-decoration: none;
    }

    .btn:focus {
      outline: 0;
      box-shadow: 0 0 0 0.25rem rgba(13,110,253,0.25);
    }

    .btn:active {
      background-color: #0a58ca;
      border-color: #0a53be;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    {% if cfdi %}
    <a href="../../imprimirPDF/{{id}}/{{tipo}}" class="btn btn-primary boton-imprimir">Descargar PDF</a>
    {% endif %}
    <div class="PDF">
      {{ html_renderizado|safe }}
    </div>
  </div>
</body>
</html>
