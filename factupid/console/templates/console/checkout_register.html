{% extends "console/index.html" %}
{% load static %}

{% block content %}
<section class="container" style="max-width: 520px; margin: 40px auto;">
  <h2>Completa tu registro</h2>
  <p>Para continuar con el pago necesitamos crear tu cuenta.</p>
  <form method="post" action="/checkout/start/">
    {% csrf_token %}
    <input type="hidden" name="plan" value="{{ plan }}">
    <input type="hidden" name="email" value="{{ email }}">

    <div style="margin-bottom: 12px;">
      <label for="email">Correo</label>
      <input id="email" type="email" value="{{ email }}" disabled style="width: 100%;">
    </div>

    <div style="margin-bottom: 12px;">
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 16px;">
      <label for="password2">Confirmar contraseña</label>
      <input id="password2" name="password2" type="password" required style="width: 100%;">
    </div>

    <button type="submit">Continuar al pago</button>
  </form>
</section>
{% endblock %}
