{% if request.user.is_authenticated %}
<form id="logoutForm" action="{% url 'cerrarsesion' %}" method="post" class="navbar-right">
    {% csrf_token %}
    <ul class="nav navbar-nav navbar-right">
        <li><span class="navbar-brand">¡Hola {{ request.user.email }}!</span></li>
        <li><a href="javascript:document.getElementById('logoutForm').submit()" style="color: red;">Cerrar sesión</a></li>
    </ul>
</form>

{% else %}

<ul class="nav navbar-nav navbar-right">
    <li><a href="{% url 'iniciarsesion' %}" style="color: white;">Iniciar sesión</a></li>
</ul>

{% endif %}
