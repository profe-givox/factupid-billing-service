# ========== CATÁLOGOS ==========

actualiza_catalogos:
  stage: utility           
  tags:
    - updatedb           
  only:
    - factupid-DB                
  script:
    - echo "=== Iniciando actualización de catálogos SAT ==="
    - cd /home/iibarra/proyectosGitLab/factupid-dev/
    - /home/iibarra/proyectosGitLab/venv/bin/python actualizacioncatalogos.py
    - echo "=== Actualización completada ==="

