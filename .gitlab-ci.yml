stages:
 - prepare
 - test
 - deploy
 - utility 

# ========== PREPARE ==========

before_staging:
 stage: prepare
 tags:
   - app2
 only:
   - borrador
 script:
   - whoami
   - cd /home/iibarra/proyectosGitLab/factupid-dev
   - git fetch --all
   - git checkout borrador
   - git reset --hard origin/borrador
   - git pull origin borrador

before_production:
 stage: prepare
 tags:
   - app1
 only:
   - borrador
 script:
   - whoami
   - cd /home/iibarra/proyectosGitLab/factupid-dev
   - git fetch --all
   - git checkout borrador
   - git reset --hard origin/borrador
   - git pull origin borrador

# ========== TEST ==========

linter_staging:
 stage: test
 tags:
   - app2
 only:
   - borrador

 variables:
    CI_ENVIRONMENT: "staging"

 script:
   - cd $CI_PROJECT_DIR/factupid

   # === INSTALAR DEPENDENCIAS PRIMERO ===
   - echo "=== Instalando dependencias ==="
   - /home/iibarra/proyectosGitLab/venv/bin/pip install -r requirements.txt

   # Crear archivo .env temporal (necesario para manage.py)
   - echo "=== Creando archivo .env temporal para pruebas ==="
   - echo "SECRET_KEY=${SECRET_KEY}" > .env
   - echo "DEBUG=False" >> .env
   - echo "DB_NAME=${DB_NAME}" >> .env
   - echo "DB_USER=${DB_USER}" >> .env
   - echo "DB_PASSWORD=${DB_PASSWORD}" >> .env
   - echo "DB_HOST=${DB_HOST}" >> .env
   - echo "DB_PORT=${DB_PORT}" >> .env
   - echo "EMAIL_HOST=${EMAIL_HOST}" >> .env
   - echo "EMAIL_PORT=${EMAIL_PORT}" >> .env
   - echo "EMAIL_USE_TLS=True" >> .env
   - echo "EMAIL_HOST_USER=${EMAIL_HOST_USER}" >> .env
   - echo "EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}" >> .env
   - echo "PAC_USER=${PAC_USER}" >> .env
   - echo "PAC_PASSWORD=${PAC_PASSWORD}" >> .env
   - echo "DOMAIN=${DOMAIN}" >> .env
   - echo "URL_TIMBRADO=${URL_TIMBRADO}" >> .env
   - echo "URL_CANCELACION=${URL_CANCELACION}" >> .env
   - echo "URL_REGISTRO_CLIENTES=${URL_REGISTRO_CLIENTES}" >> .env
   - echo "URL_VALIDACION=${URL_VALIDACION}" >> .env
   - echo "URL_UTILITIES=${URL_UTILITIES}" >> .env
   - echo "URL_SIGNCONTRACT=${URL_SIGNCONTRACT}" >> .env
   - echo "ENCRYPTION_KEY=${ENCRYPTION_KEY}" >> .env

   # Mostrar parte del .env (seguro)
   - echo "=== Variables cargadas ==="
   - grep -E "DB_|DEBUG|EMAIL_" .env

   # Linter
   - /home/iibarra/proyectosGitLab/venv/bin/black . || true
   # Tests
   - /home/iibarra/proyectosGitLab/venv/bin/python manage.py test --noinput


linter_production:
 stage: test
 tags:
   - app1
 only:
   - borrador
 variables:
    CI_ENVIRONMENT: "production"

 script:
   - export CI_ENVIRONMENT=production
   - cd $CI_PROJECT_DIR/factupid

   # === INSTALAR DEPENDENCIAS PRIMERO ===
   - echo "=== Instalando dependencias ==="
   - /home/iibarra/proyectosGitLab/venv/bin/pip install -r requirements.txt

   # Crear archivo .env temporal (necesario para manage.py)
   - echo "=== Creando archivo .env temporal para pruebas ==="
   - echo "SECRET_KEY=${SECRET_KEY}" > .env
   - echo "DEBUG=False" >> .env
   - echo "DB_NAME=${DB_NAME}" >> .env
   - echo "DB_USER=${DB_USER}" >> .env
   - echo "DB_PASSWORD=${DB_PASSWORD}" >> .env
   - echo "DB_HOST=${DB_HOST}" >> .env
   - echo "DB_PORT=${DB_PORT}" >> .env
   - echo "EMAIL_HOST=${EMAIL_HOST}" >> .env
   - echo "EMAIL_PORT=${EMAIL_PORT}" >> .env
   - echo "EMAIL_USE_TLS=True" >> .env
   - echo "EMAIL_HOST_USER=${EMAIL_HOST_USER}" >> .env
   - echo "EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}" >> .env
   - echo "PAC_USER=${PAC_USER}" >> .env
   - echo "PAC_PASSWORD=${PAC_PASSWORD}" >> .env
   - echo "DOMAIN=${DOMAIN}" >> .env
   - echo "URL_TIMBRADO=${URL_TIMBRADO}" >> .env
   - echo "URL_CANCELACION=${URL_CANCELACION}" >> .env
   - echo "URL_REGISTRO_CLIENTES=${URL_REGISTRO_CLIENTES}" >> .env
   - echo "URL_VALIDACION=${URL_VALIDACION}" >> .env
   - echo "URL_UTILITIES=${URL_UTILITIES}" >> .env
   - echo "URL_SIGNCONTRACT=${URL_SIGNCONTRACT}" >> .env
   - echo "ENCRYPTION_KEY=${ENCRYPTION_KEY}" >> .env

   # Mostrar parte del .env (seguro)
   - echo "=== Variables cargadas ==="
   - grep -E "DB_|DEBUG|EMAIL_" .env

   # Linter
   - /home/iibarra/proyectosGitLab/venv/bin/black . || true
   # Tests
   - /home/iibarra/proyectosGitLab/venv/bin/python manage.py test --noinput

# ========== DEPLOY ==========

after_staging:
 stage: deploy
 tags:
   - app2
 only:
   - borrador
 script:
   - cd /home/iibarra/proyectosGitLab/factupid-dev/factupid
   - /home/iibarra/proyectosGitLab/venv/bin/pip install -r requirements.txt
   
   # Crear .env de entorno (idéntico al anterior)
   - echo "=== Creando archivo .env de despliegue ==="
   - echo "SECRET_KEY=${SECRET_KEY}" > .env
   - echo "DEBUG=False" >> .env
   - echo "DB_NAME=${DB_NAME}" >> .env
   - echo "DB_USER=${DB_USER}" >> .env
   - echo "DB_PASSWORD=${DB_PASSWORD}" >> .env
   - echo "DB_HOST=${DB_HOST}" >> .env
   - echo "DB_PORT=${DB_PORT}" >> .env
   - echo "EMAIL_HOST=${EMAIL_HOST}" >> .env
   - echo "EMAIL_PORT=${EMAIL_PORT}" >> .env
   - echo "EMAIL_USE_TLS=True" >> .env
   - echo "EMAIL_HOST_USER=${EMAIL_HOST_USER}" >> .env
   - echo "EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}" >> .env
   - echo "PAC_USER=${PAC_USER}" >> .env
   - echo "PAC_PASSWORD=${PAC_PASSWORD}" >> .env
   - echo "DOMAIN=${DOMAIN}" >> .env
   - echo "URL_TIMBRADO=${URL_TIMBRADO}" >> .env
   - echo "URL_CANCELACION=${URL_CANCELACION}" >> .env
   - echo "URL_REGISTRO_CLIENTES=${URL_REGISTRO_CLIENTES}" >> .env
   - echo "URL_VALIDACION=${URL_VALIDACION}" >> .env
   - echo "URL_UTILITIES=${URL_UTILITIES}" >> .env
   - echo "URL_SIGNCONTRACT=${URL_SIGNCONTRACT}" >> .env
   - echo "ENCRYPTION_KEY=${ENCRYPTION_KEY}" >> .env

   # DB sync
   - /home/iibarra/proyectosGitLab/venv/bin/python manage.py migrate --noinput
   # Static sync
   - /home/iibarra/proyectosGitLab/venv/bin/python manage.py compilemessages || true
   - /home/iibarra/proyectosGitLab/venv/bin/python manage.py collectstatic --no-input
   # Restart web server
   - sudo systemctl restart gunicorn

