deploy_api:
  stage: deploy
  tags:
    - payment
  only:
    - main
  script:
    - cd /var/factupid-billing-service
    - git fetch origin
    - git reset --hard origin/main
    - cd /var/factupid-billing-service/api_cobranza
    - source .venv/bin/activate
    - pip install -r requirements.txt

    # Crear .env para despliegue
    - echo "=== Creando archivo .env de despliegue ==="
    - echo "DATABASE_URL=${DATABASE_URL}" > .env
    - echo "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}" >> .env
    - echo "STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}" >> .env
    - echo "STRIPE_ENDPOINT_SECRET=${STRIPE_ENDPOINT_SECRET}" >> .env
    - echo "STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL}" >> .env
    - echo "STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL}" >> .env
    
    - echo "JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}" >> .env
    - echo "JWT_ALGORITHM=${JWT_ALGORITHM}" >> .env
    - echo "JWT_ISSUER=${JWT_ISSUER}" >> .env
    - echo "JWT_AUDIENCE=${JWT_AUDIENCE}" >> .env
    - echo "JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}" >> .env

    - echo "=== Aplicando migraciones ==="
    - alembic upgrade head

    - echo "=== Ejecutando seed de planes ==="
    - python -c "from app.db.seed import seed_plans; seed_plans()"

    - sudo systemctl restart factupid-billing
    - sudo systemctl status factupid-billing --no-pager